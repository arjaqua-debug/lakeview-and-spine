# Lakeview Spine & Wellness — Netlify Configuration
# Deploy from: antigravity-site/ (set as publish directory in Netlify UI)

[build]
  publish = "."
  command = ""

# Redirects
[[redirects]]
  from = "/home"
  to   = "/"
  status = 301

[[redirects]]
  from = "/appointments"
  to   = "/book"
  status = 301

[[redirects]]
  from = "/booking"
  to   = "/book"
  status = 301

# Custom 404
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
